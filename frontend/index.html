<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenseOS — Track Smarter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3e;
      --accent: #7c6af7;
      --accent2: #f7c36a;
      --accent3: #6af7c3;
      --danger: #f76a6a;
      --text: #e8e8f0;
      --muted: #7070a0;
      --radius: 14px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; right: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(247,195,106,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ─── HEADER ──────────────────────────────────── */
    header {
      position: sticky; top:0; z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .logo {
      font-family: var(--font-head);
      font-size: 1.4rem; font-weight: 800;
      letter-spacing: -0.03em;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }
    .logo span { color: var(--accent); }
    .header-right { display: flex; gap: 0.75rem; align-items: center; }
    .tab-btn {
      padding: 0.4rem 1rem;
      border-radius: 8px;
      border: 1px solid transparent;
      font-family: var(--font-body);
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--muted);
    }
    .tab-btn:hover { color: var(--text); background: var(--surface2); }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ─── LAYOUT ──────────────────────────────────── */
    .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 2rem; }

    /* ─── PAGE SECTIONS ───────────────────────────── */
    .page { display: none; }
    .page.active { display: block; animation: fadeUp 0.35s ease; }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ─── STAT CARDS ──────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      position: relative; overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .stat-card::before {
      content: '';
      position: absolute; top:0; right:0;
      width: 80px; height: 80px;
      background: var(--glow, rgba(124,106,247,0.08));
      border-radius: 50%;
      transform: translate(30%, -30%);
    }
    .stat-label {
      font-size: 0.75rem; font-weight: 500;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-family: var(--font-head);
      font-size: 2rem; font-weight: 700;
      letter-spacing: -0.03em;
    }
    .stat-sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }

    /* ─── SECTION HEADER ──────────────────────────── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .section-title {
      font-family: var(--font-head);
      font-size: 1.1rem; font-weight: 700;
    }

    /* ─── ADD FORM ────────────────────────────────── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .form-title {
      font-family: var(--font-head);
      font-size: 1.5rem; font-weight: 700;
      margin-bottom: 1.75rem;
      display: flex; align-items: center; gap: 10px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media(max-width:640px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 0.78rem; font-weight: 500;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em;
    }
    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
    }
    select option { background: var(--surface2); }
    textarea { resize: vertical; min-height: 80px; }
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      border: none;
      font-family: var(--font-head);
      font-size: 0.95rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #9585f9; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,106,247,0.4); }
    .btn-danger {
      background: rgba(247,106,106,0.15);
      color: var(--danger);
      border: 1px solid rgba(247,106,106,0.3);
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
    }
    .btn-danger:hover { background: rgba(247,106,106,0.25); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); background: var(--surface2); }

    /* ─── EXPENSE TABLE ───────────────────────────── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .filter-bar {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .filter-bar input, .filter-bar select {
      padding: 0.5rem 0.85rem;
      font-size: 0.85rem;
      flex: 1; min-width: 120px;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 0.85rem 1.25rem;
      text-align: left;
      font-size: 0.72rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: 1rem 1.25rem; font-size: 0.9rem; }
    .td-title { font-weight: 500; }
    .td-amount {
      font-family: var(--font-mono);
      font-weight: 500; color: var(--accent2);
    }
    .td-note { color: var(--muted); font-size: 0.82rem; }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.65rem;
      border-radius: 20px;
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.02em;
    }
    .td-actions { display: flex; gap: 0.5rem; }

    /* Category badge colors */
    .cat-food     { background: rgba(247,195,106,0.15); color: #f7c36a; }
    .cat-transport{ background: rgba(106,247,195,0.15); color: #6af7c3; }
    .cat-housing  { background: rgba(124,106,247,0.15); color: #9585f9; }
    .cat-health   { background: rgba(247,106,106,0.15); color: #f76a6a; }
    .cat-entertainment { background: rgba(247,106,200,0.15); color: #f76ac8; }
    .cat-education{ background: rgba(106,195,247,0.15); color: #6ac3f7; }
    .cat-shopping { background: rgba(200,247,106,0.15); color: #c8f76a; }
    .cat-other    { background: rgba(150,150,150,0.15); color: #a0a0c0; }

    /* ─── SUMMARY PAGE ────────────────────────────── */
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    @media(max-width:768px) { .summary-grid { grid-template-columns: 1fr; } }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .summary-card h3 {
      font-family: var(--font-head);
      font-size: 0.95rem; font-weight: 700;
      margin-bottom: 1.25rem;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* bar chart */
    .bar-row {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 0.85rem;
    }
    .bar-label { font-size: 0.82rem; width: 110px; flex-shrink: 0; }
    .bar-track {
      flex: 1; height: 8px;
      background: var(--surface2); border-radius: 4px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.8s cubic-bezier(.22,.68,0,1.2);
    }
    .bar-amt {
      font-family: var(--font-mono);
      font-size: 0.8rem; color: var(--accent2);
      width: 80px; text-align: right; flex-shrink: 0;
    }

    /* monthly list */
    .month-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
    }
    .month-row:last-child { border-bottom: none; }
    .month-name { font-weight: 500; }
    .month-info { text-align: right; }
    .month-total {
      font-family: var(--font-mono);
      color: var(--accent2); font-weight: 500;
    }
    .month-count { font-size: 0.78rem; color: var(--muted); }

    /* recent list */
    .recent-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
    }
    .recent-item:last-child { border-bottom: none; }
    .recent-left { display: flex; flex-direction: column; gap: 2px; }
    .recent-title { font-weight: 500; font-size: 0.9rem; }
    .recent-meta { font-size: 0.78rem; color: var(--muted); }
    .recent-amt {
      font-family: var(--font-mono);
      color: var(--accent2); font-weight: 600;
    }

    /* ─── TOAST ───────────────────────────────────── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      font-size: 0.9rem; font-weight: 500;
      z-index: 999;
      transform: translateY(80px); opacity: 0;
      transition: all 0.35s cubic-bezier(.22,.68,0,1.2);
      display: flex; align-items: center; gap: 10px;
      max-width: 320px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--accent3); color: var(--accent3); }
    #toast.error   { border-color: var(--danger);  color: var(--danger); }

    /* ─── EMPTY STATE ─────────────────────────────── */
    .empty {
      text-align: center; padding: 4rem 2rem;
      color: var(--muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    .empty h3 { font-family: var(--font-head); font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text); }

    /* ─── LOADING ─────────────────────────────────── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── MODAL ───────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%; max-width: 480px;
      animation: fadeUp 0.3s ease;
    }
    .modal-title {
      font-family: var(--font-head);
      font-size: 1.25rem; font-weight: 700;
      margin-bottom: 1.5rem;
    }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; justify-content: flex-end; }
    .hidden { display: none !important; }

    /* API status pill */
    .api-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: var(--muted);
      font-family: var(--font-mono);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
    }
    .status-dot.ok  { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }
    .status-dot.err { background: var(--danger); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">💸</div>
    Expense<span>OS</span>
  </div>
  <div class="header-right">
    <div class="api-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">connecting…</span>
    </div>
    <button class="tab-btn active" onclick="showPage('dashboard')">Dashboard</button>
    <button class="tab-btn" onclick="showPage('add')">+ Add</button>
    <button class="tab-btn" onclick="showPage('history')">History</button>
    <button class="tab-btn" onclick="showPage('summary')">Summary</button>
  </div>
</header>

<div class="app">

  <!-- ──────────── DASHBOARD ──────────── -->
  <div class="page active" id="page-dashboard">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card" style="--glow:rgba(124,106,247,0.12)">
        <div class="stat-label">Total Spent</div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-card" style="--glow:rgba(247,195,106,0.12)">
        <div class="stat-label">This Month</div>
        <div class="stat-value" id="statMonth">—</div>
        <div class="stat-sub" id="statMonthName">—</div>
      </div>
      <div class="stat-card" style="--glow:rgba(106,247,195,0.12)">
        <div class="stat-label">Transactions</div>
        <div class="stat-value" id="statCount">—</div>
        <div class="stat-sub">Total records</div>
      </div>
      <div class="stat-card" style="--glow:rgba(247,106,200,0.12)">
        <div class="stat-label">Top Category</div>
        <div class="stat-value" id="statTopCat" style="font-size:1.3rem">—</div>
        <div class="stat-sub" id="statTopCatAmt">—</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">Recent Transactions</div>
      <button class="btn btn-ghost" onclick="showPage('history')" style="padding:.4rem 1rem;font-size:.82rem">View all →</button>
    </div>
    <div class="table-wrap" id="recentList">
      <div class="empty"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- ──────────── ADD EXPENSE ──────────── -->
  <div class="page" id="page-add">
    <div class="form-card">
      <div class="form-title">✦ Add Expense</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Title *</label>
          <input id="fTitle" type="text" placeholder="e.g. Grocery run" />
        </div>
        <div class="form-group">
          <label>Amount (₹) *</label>
          <input id="fAmount" type="number" placeholder="0.00" step="0.01" min="0.01" />
        </div>
        <div class="form-group">
          <label>Category *</label>
          <select id="fCategory">
            <option value="">Select category</option>
            <option>Food</option>
            <option>Transport</option>
            <option>Housing</option>
            <option>Health</option>
            <option>Entertainment</option>
            <option>Education</option>
            <option>Shopping</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date *</label>
          <input id="fDate" type="date" />
        </div>
        <div class="form-group full">
          <label>Note (optional)</label>
          <textarea id="fNote" placeholder="Any extra details…"></textarea>
        </div>
      </div>
      <div style="margin-top:1.5rem;display:flex;gap:.75rem">
        <button class="btn btn-primary" onclick="addExpense()">💾 Save Expense</button>
        <button class="btn btn-ghost" onclick="resetForm()">Clear</button>
      </div>
    </div>
  </div>

  <!-- ──────────── HISTORY ──────────── -->
  <div class="page" id="page-history">
    <div class="section-header">
      <div class="section-title">All Transactions</div>
      <span id="countBadge" style="font-size:.8rem;color:var(--muted)"></span>
    </div>
    <div class="table-wrap">
      <div class="filter-bar">
        <input id="fSearch" type="text" placeholder="🔍 Search title…" oninput="filterExpenses()" style="max-width:200px" />
        <select id="fCatFilter" onchange="filterExpenses()">
          <option value="all">All categories</option>
          <option>Food</option><option>Transport</option><option>Housing</option>
          <option>Health</option><option>Entertainment</option><option>Education</option>
          <option>Shopping</option><option>Other</option>
        </select>
        <input id="fFromDate" type="date" onchange="filterExpenses()" />
        <input id="fToDate"   type="date" onchange="filterExpenses()" />
        <button class="btn btn-ghost" onclick="clearFilters()" style="padding:.5rem 1rem;font-size:.82rem">Clear</button>
      </div>
      <div id="expenseTable">
        <div class="empty"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- ──────────── SUMMARY ──────────── -->
  <div class="page" id="page-summary">
    <div class="summary-grid" id="summaryContent">
      <div class="empty" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<!-- Edit Modal -->
<div class="modal-overlay hidden" id="editModal">
  <div class="modal">
    <div class="modal-title">✏️ Edit Expense</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Title</label>
        <input id="eTitle" type="text" />
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input id="eAmount" type="number" step="0.01" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="eCategory">
          <option>Food</option><option>Transport</option><option>Housing</option>
          <option>Health</option><option>Entertainment</option><option>Education</option>
          <option>Shopping</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input id="eDate" type="date" />
      </div>
      <div class="form-group full">
        <label>Note</label>
        <textarea id="eNote"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:5000/api'
    : '/api';

  let allExpenses = [];
  let editingId   = null;

  // ── Init ──────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('fDate').valueAsDate = new Date();
    checkHealth();
    loadDashboard();
  });

  async function checkHealth() {
    try {
      const r = await fetch(API.replace('/api','') + '/health');
      const ok = r.ok;
      document.getElementById('statusDot').className  = 'status-dot ' + (ok ? 'ok' : 'err');
      document.getElementById('statusText').textContent = ok ? 'API online' : 'API error';
    } catch {
      document.getElementById('statusDot').className  = 'status-dot err';
      document.getElementById('statusText').textContent = 'Offline – using demo';
    }
  }

  // ── Navigation ────────────────────────────────────────────────────────────
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => {
      if (b.textContent.toLowerCase().includes(name === 'add' ? '+' : name))
        b.classList.add('active');
    });

    if (name === 'dashboard') loadDashboard();
    if (name === 'history')   loadHistory();
    if (name === 'summary')   loadSummary();
  }

  // ── API helpers ───────────────────────────────────────────────────────────
  async function apiFetch(path, opts = {}) {
    const r = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts
    });
    if (!r.ok) throw new Error((await r.json()).error || r.statusText);
    return r.json();
  }

  // ── Dashboard ─────────────────────────────────────────────────────────────
  async function loadDashboard() {
    try {
      const s = await apiFetch('/expenses/summary');
      document.getElementById('statTotal').textContent = fmt(s.total);

      const now = new Date();
      const ym  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
      const mo  = s.monthly.find(m => m.month === ym);
      document.getElementById('statMonth').textContent = mo ? fmt(mo.total) : '₹0';
      document.getElementById('statMonthName').textContent =
        now.toLocaleString('default', { month: 'long', year: 'numeric' });

      const allExp = await apiFetch('/expenses');
      document.getElementById('statCount').textContent = allExp.length;

      if (s.byCategory.length) {
        document.getElementById('statTopCat').textContent = s.byCategory[0].category;
        document.getElementById('statTopCatAmt').textContent = fmt(s.byCategory[0].total);
      }

      renderRecentList(s.recent || allExp.slice(0,5));
    } catch { renderRecentList([]); }
  }

  function renderRecentList(items) {
    const el = document.getElementById('recentList');
    if (!items.length) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><h3>No expenses yet</h3><p>Add your first one!</p></div>`;
      return;
    }
    el.innerHTML = items.map(e => `
      <div class="recent-item" style="padding:1rem 1.25rem">
        <div class="recent-left">
          <div class="recent-title">${esc(e.title)}</div>
          <div class="recent-meta">${e.date} · <span class="badge ${catClass(e.category)}">${e.category}</span></div>
        </div>
        <div class="recent-amt">${fmt(e.amount)}</div>
      </div>`).join('');
  }

  // ── History ───────────────────────────────────────────────────────────────
  async function loadHistory() {
    const el = document.getElementById('expenseTable');
    el.innerHTML = '<div class="empty"><div class="spinner"></div></div>';
    try {
      allExpenses = await apiFetch('/expenses');
      renderTable(allExpenses);
    } catch { el.innerHTML = '<div class="empty">Failed to load</div>'; }
  }

  function renderTable(data) {
    const el = document.getElementById('expenseTable');
    document.getElementById('countBadge').textContent = `${data.length} record${data.length !== 1 ? 's' : ''}`;
    if (!data.length) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><h3>No expenses found</h3></div>`;
      return;
    }
    el.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Title</th><th>Category</th><th>Amount</th><th>Date</th><th>Note</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${data.map(e => `
          <tr>
            <td class="td-title">${esc(e.title)}</td>
            <td><span class="badge ${catClass(e.category)}">${e.category}</span></td>
            <td class="td-amount">${fmt(e.amount)}</td>
            <td>${e.date}</td>
            <td class="td-note">${esc(e.note || '—')}</td>
            <td class="td-actions">
              <button class="btn btn-ghost" onclick="openEdit(${e.id})" style="padding:.35rem .75rem;font-size:.8rem">✏️</button>
              <button class="btn btn-danger" onclick="deleteExpense(${e.id})">🗑</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  function filterExpenses() {
    const q   = document.getElementById('fSearch').value.toLowerCase();
    const cat = document.getElementById('fCatFilter').value;
    const from= document.getElementById('fFromDate').value;
    const to  = document.getElementById('fToDate').value;
    const filtered = allExpenses.filter(e => {
      if (q   && !e.title.toLowerCase().includes(q)) return false;
      if (cat !== 'all' && e.category !== cat) return false;
      if (from && e.date < from) return false;
      if (to   && e.date > to)   return false;
      return true;
    });
    renderTable(filtered);
  }

  function clearFilters() {
    ['fSearch','fCatFilter','fFromDate','fToDate'].forEach(id => {
      const el = document.getElementById(id);
      el.value = id === 'fCatFilter' ? 'all' : '';
    });
    renderTable(allExpenses);
  }

  // ── Add expense ───────────────────────────────────────────────────────────
  async function addExpense() {
    const title    = document.getElementById('fTitle').value.trim();
    const amount   = parseFloat(document.getElementById('fAmount').value);
    const category = document.getElementById('fCategory').value;
    const date     = document.getElementById('fDate').value;
    const note     = document.getElementById('fNote').value.trim();

    if (!title || !amount || !category || !date) return toast('Fill all required fields','error');

    try {
      await apiFetch('/expenses', {
        method: 'POST',
        body: JSON.stringify({ title, amount, category, date, note })
      });
      toast('Expense added!', 'success');
      resetForm();
      showPage('dashboard');
    } catch (err) { toast(err.message, 'error'); }
  }

  function resetForm() {
    ['fTitle','fAmount','fNote'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fCategory').value = '';
    document.getElementById('fDate').valueAsDate = new Date();
  }

  // ── Edit / Delete ─────────────────────────────────────────────────────────
  async function openEdit(id) {
    try {
      const e = await apiFetch(`/expenses/${id}`);
      editingId = id;
      document.getElementById('eTitle').value    = e.title;
      document.getElementById('eAmount').value   = e.amount;
      document.getElementById('eCategory').value = e.category;
      document.getElementById('eDate').value     = e.date;
      document.getElementById('eNote').value     = e.note || '';
      document.getElementById('editModal').classList.remove('hidden');
    } catch { toast('Failed to load expense','error'); }
  }

  function closeModal() { document.getElementById('editModal').classList.add('hidden'); editingId = null; }

  async function saveEdit() {
    try {
      await apiFetch(`/expenses/${editingId}`, {
        method: 'PUT',
        body: JSON.stringify({
          title:    document.getElementById('eTitle').value.trim(),
          amount:   parseFloat(document.getElementById('eAmount').value),
          category: document.getElementById('eCategory').value,
          date:     document.getElementById('eDate').value,
          note:     document.getElementById('eNote').value.trim()
        })
      });
      closeModal();
      toast('Expense updated!', 'success');
      loadHistory();
    } catch (err) { toast(err.message,'error'); }
  }

  async function deleteExpense(id) {
    if (!confirm('Delete this expense?')) return;
    try {
      await apiFetch(`/expenses/${id}`, { method: 'DELETE' });
      toast('Deleted', 'success');
      loadHistory();
    } catch { toast('Delete failed','error'); }
  }

  // ── Summary ───────────────────────────────────────────────────────────────
  async function loadSummary() {
    const el = document.getElementById('summaryContent');
    try {
      const s = await apiFetch('/expenses/summary');
      const maxAmt = s.byCategory.length ? s.byCategory[0].total : 1;

      el.innerHTML = `
        <div class="summary-card" style="grid-column:1/-1">
          <h3>Spending by Category</h3>
          ${s.byCategory.length ? s.byCategory.map(c => `
            <div class="bar-row">
              <div class="bar-label"><span class="badge ${catClass(c.category)}">${c.category}</span></div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${Math.round((c.total/maxAmt)*100)}%"></div>
              </div>
              <div class="bar-amt">${fmt(c.total)}</div>
            </div>`).join('')
          : '<p style="color:var(--muted)">No data yet</p>'}
        </div>

        <div class="summary-card">
          <h3>Monthly Breakdown</h3>
          ${s.monthly.length ? s.monthly.map(m => `
            <div class="month-row">
              <div class="month-name">${formatMonth(m.month)}</div>
              <div class="month-info">
                <div class="month-total">${fmt(m.total)}</div>
                <div class="month-count">${m.count} transaction${m.count !== 1?'s':''}</div>
              </div>
            </div>`).join('')
          : '<p style="color:var(--muted)">No data yet</p>'}
        </div>

        <div class="summary-card">
          <h3>Recent Activity</h3>
          ${s.recent.length ? s.recent.map(e => `
            <div class="recent-item">
              <div class="recent-left">
                <div class="recent-title">${esc(e.title)}</div>
                <div class="recent-meta">${e.date} · ${e.category}</div>
              </div>
              <div class="recent-amt">${fmt(e.amount)}</div>
            </div>`).join('')
          : '<p style="color:var(--muted)">No data yet</p>'}
        </div>`;
    } catch {
      el.innerHTML = '<div class="empty">Failed to load summary</div>';
    }
  }

  // ── Utilities ─────────────────────────────────────────────────────────────
  const fmt = n => '₹' + Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const catClass = c => 'cat-' + (c || 'other').toLowerCase().replace(/\s+/g,'-');
  const formatMonth = ym => {
    const [y,m] = ym.split('-');
    return new Date(y, m-1).toLocaleString('default',{month:'long',year:'numeric'});
  };

  let toastTimer;
  function toast(msg, type='success') {
    const el = document.getElementById('toast');
    el.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 3000);
  }
</script>
</body>
</html>
