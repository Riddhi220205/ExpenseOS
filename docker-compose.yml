version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  ExpenseOS – Docker Compose Stack
#  Services: backend (Node.js + SQLite) + frontend (nginx)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      # Persist the SQLite database outside the container
      - expense-data:/app/data
    ports:
      - "5000:5000"     # exposed for local dev / testing; remove in pure prod
    
    networks:
      - expense-net
 

  # ── Frontend (nginx) ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expense-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend
     
    networks:
      - expense-net
    
# ── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  expense-data:
    driver: local

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  expense-net:
    driver: bridge
