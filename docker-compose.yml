version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  ExpenseOS – Docker Compose Stack
#  Services: backend (Node.js + SQLite) + frontend (nginx)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      # Persist the SQLite database outside the container
      - expense-data:/app/data
    ports:
      - "5000:5000"     # exposed for local dev / testing; remove in pure prod
    
    networks:
      - expense-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Frontend (nginx) ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expense-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - expense-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

# ── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  expense-data:
    driver: local

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  expense-net:
    driver: bridge
